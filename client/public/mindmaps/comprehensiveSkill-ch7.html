<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第七章 常见病症的自我药疗 - 思维导图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #mindmap { width: 100vw; height: 100vh; }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #fa8c16; color: white; padding: 12px 24px;
    font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header .subject { font-size: 13px; opacity: 0.85; }
  .legend {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: white; padding: 12px 16px; border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; color: #666;
  }
  .legend b { color: #333; }
</style>
</head>
<body>
<div class="header">
  <span>🧠 第七章 常见病症的自我药疗</span>
  <span class="subject">综合技能</span>
</div>
<svg id="mindmap"></svg>
<div class="legend">
  <b>操作：</b> 鼠标拖拽移动 · 滚轮缩放 · 点击节点展开/折叠
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
<script>
  const md = "# 常见病症自我药疗\n\n## 发热\n- 分级\n  - 低热 37.3-38℃\n  - 中热 38.1-39℃\n  - 高热 39.1-41℃\n- 首选：对乙酰氨基酚 / 布洛芬\n- >38.5℃才用药\n- 儿童❌阿司匹林（瑞夷综合征）\n- 间隔4-6小时\n\n## 感冒\n- 鼻病毒引起，对症治疗\n- 四对症\n  - 解热（对乙酰氨基酚）\n  - 鼻塞（伪麻黄碱）\n  - 流涕（氯苯那敏）\n  - 咳嗽（右美沙芬）\n- ❌不需要抗生素\n- 高血压慎用伪麻黄碱\n\n## 腹泻\n- **补液第一**\n  - ORS口服补液盐\n- 蒙脱石散（吸附毒素）\n- 微生态制剂（双歧杆菌）\n- 细菌性才用抗生素\n- ❌感染性腹泻不用洛哌丁胺\n\n## 便秘\n- 容积性（欧车前）→ 增体积\n- 渗透性（乳果糖）→ 增水分\n- 刺激性（番泻叶）→ 不宜长期\n- 润滑性（开塞露）→ 润肠壁\n\n## 疼痛\n- 轻中度：对乙酰氨基酚首选\n- 牙痛：布洛芬效果好\n- 痛经：布洛芬/萘普生\n- NSAIDs饭后服用\n\n## 皮肤病\n- 痤疮：过氧苯甲酰/维A酸\n- 湿疹：外用糖皮质激素\n- 手足癣：特比萘芬乳膏\n- 荨麻疹：氯雷他定\n\n## 口诀速记\n- 🎯 发热首选对布，38.5才用药\n- 🎯 感冒四对症：热鼻涕咳\n- 🎯 腹泻补液第一，蒙脱微生二三\n- 🎯 容渗刺润四泻药，刺激不能长期用";
  const { Transformer } = markmap;
  const { Markmap } = window.markmap;
  const transformer = new Transformer();
  const { root } = transformer.transform(md);
  const mm = Markmap.create('#mindmap', {
    colorFreezeLevel: 2,
    initialExpandLevel: 3,
    paddingX: 16,
    autoFit: true,
    duration: 300
  }, root);
  setTimeout(() => mm.fit(), 500);
</script>
</body>
</html>
