<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第三章 中枢神经系统药理学 - 思维导图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #mindmap { width: 100vw; height: 100vh; }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #1890ff; color: white; padding: 12px 24px;
    font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header .subject { font-size: 13px; opacity: 0.85; }
  .legend {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: white; padding: 12px 16px; border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; color: #666;
  }
  .legend b { color: #333; }
</style>
</head>
<body>
<div class="header">
  <span>🧠 第三章 中枢神经系统药理学</span>
  <span class="subject">药理学</span>
</div>
<svg id="mindmap"></svg>
<div class="legend">
  <b>操作：</b> 鼠标拖拽移动 · 滚轮缩放 · 点击节点展开/折叠
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
<script>
  const md = "# 中枢神经系统药理学\n\n## 镇静催眠药\n- **苯二氮卓类（地西泮）**\n  - 增强GABA → Cl⁻通道开放频率↑\n  - 安全范围大\n  - 用途：焦虑、失眠、惊厥、肌松\n- **巴比妥类**\n  - Cl⁻通道开放时间↑\n  - 安全范围小\n\n## 抗癫痫药\n- 大发作首选\n  - 苯妥英钠（阻Na⁺通道）\n  - 卡马西平\n- 小发作首选\n  - 乙琥胺\n- 持续状态首选\n  - 地西泮\n- 广谱\n  - 丙戊酸钠（增GABA）\n\n## 抗精神病药\n- **氯丙嗪**\n  - 阻断D₂受体\n  - 镇静、镇吐、降温\n  - 不良反应\n    - 锥体外系反应\n      - 帕金森综合征\n      - 急性肌张力障碍\n      - 静坐不能\n      - 迟发性运动障碍\n    - 体位性低血压（阻α受体）\n\n## 抗抑郁药\n- 三环类（阿米替林）\n  - 抑制NE+5-HT再摄取\n  - 抗胆碱作用、心脏毒性\n- SSRI（氟西汀）\n  - 选择性抑制5-HT再摄取\n  - 不良反应少\n\n## 镇痛药\n- **吗啡**\n  - 激动μ阿片受体\n  - 五大作用\n    - 镇痛（钝痛>锐痛）\n    - 镇静\n    - 抑制呼吸\n    - 镇咳\n    - 缩瞳+便秘\n  - 用途：急性锐痛、心源性哮喘\n  - 禁忌：哮喘、颅高压、分娩\n\n## 解热镇痛药\n- **阿司匹林**\n  - 不可逆抑制COX → PG↓\n  - 四作用：热痛炎板\n  - 不良反应：胃肠、出血、水杨酸反应\n- **对乙酰氨基酚**\n  - 抑制中枢COX\n  - 无抗炎作用\n  - 不伤胃\n\n## 口诀速记\n- 🎯 大发苯卡，小发乙琥，持续地西泮\n- 🎯 吗啡五作用：痛静呼咳缩\n- 🎯 阿司匹林四作用：热痛炎板";
  const { Transformer } = markmap;
  const { Markmap } = window.markmap;
  const transformer = new Transformer();
  const { root } = transformer.transform(md);
  const mm = Markmap.create('#mindmap', {
    colorFreezeLevel: 2,
    initialExpandLevel: 3,
    paddingX: 16,
    autoFit: true,
    duration: 300
  }, root);
  setTimeout(() => mm.fit(), 500);
</script>
</body>
</html>
