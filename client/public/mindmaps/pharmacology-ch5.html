<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第五章 内脏系统药理学 - 思维导图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #mindmap { width: 100vw; height: 100vh; }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #1890ff; color: white; padding: 12px 24px;
    font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header .subject { font-size: 13px; opacity: 0.85; }
  .legend {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: white; padding: 12px 16px; border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; color: #666;
  }
  .legend b { color: #333; }
</style>
</head>
<body>
<div class="header">
  <span>🧠 第五章 内脏系统药理学</span>
  <span class="subject">药理学</span>
</div>
<svg id="mindmap"></svg>
<div class="legend">
  <b>操作：</b> 鼠标拖拽移动 · 滚轮缩放 · 点击节点展开/折叠
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
<script>
  const md = "# 内脏系统药理学\n\n## 消化系统药\n- **抗酸药**\n  - 氢氧化铝、碳酸氢钠\n  - 中和胃酸\n- **H₂受体阻断药**\n  - 西咪替丁、雷尼替丁\n  - 阻断壁细胞H₂受体\n  - 减少胃酸分泌\n- **质子泵抑制剂 PPI**\n  - 奥美拉唑\n  - 不可逆抑制H⁺/K⁺-ATP酶\n  - 🔥 最强抑酸药\n- **胃黏膜保护药**\n  - 硫糖铝、枸橼酸铋钾\n\n## 呼吸系统药\n- **β₂受体激动剂**\n  - 沙丁胺醇\n  - 急性发作首选\n  - 松弛支气管平滑肌\n- **茶碱类**\n  - 氨茶碱\n  - 抑制PDE → cAMP↑\n  - 平喘+强心+利尿\n- **抗胆碱药**\n  - 异丙托溴铵\n  - 阻断M受体\n- **糖皮质激素（吸入）**\n  - 布地奈德\n  - 长期控制首选\n\n## 利尿药\n- **高效**（呋塞米）\n  - 髓袢升支粗段\n  - 抑制Na⁺-K⁺-2Cl⁻\n  - 不良反应：低血钾、耳毒性\n- **中效**（氢氯噻嗪）\n  - 远曲小管近端\n  - 抑制Na⁺-Cl⁻\n  - 不良反应：低血钾、高血糖\n- **低效**\n  - 螺内酯（拮抗醛固酮）\n  - 氨苯蝶啶（直接抑Na⁺）\n  - 保钾利尿\n\n## 口诀速记\n- 🎯 PPI最强H₂次，抗酸保护辅助用\n- 🎯 急性沙丁胺，长期布地奈\n- 🎯 呋高中噻嗪，螺内低效醛固酮";
  const { Transformer } = markmap;
  const { Markmap } = window.markmap;
  const transformer = new Transformer();
  const { root } = transformer.transform(md);
  const mm = Markmap.create('#mindmap', {
    colorFreezeLevel: 2,
    initialExpandLevel: 3,
    paddingX: 16,
    autoFit: true,
    duration: 300
  }, root);
  setTimeout(() => mm.fit(), 500);
</script>
</body>
</html>
