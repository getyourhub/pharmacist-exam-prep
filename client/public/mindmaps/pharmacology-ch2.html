<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第二章 传出神经系统药理学 - 思维导图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #mindmap { width: 100vw; height: 100vh; }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #1890ff; color: white; padding: 12px 24px;
    font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header .subject { font-size: 13px; opacity: 0.85; }
  .legend {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: white; padding: 12px 16px; border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; color: #666;
  }
  .legend b { color: #333; }
</style>
</head>
<body>
<div class="header">
  <span>🧠 第二章 传出神经系统药理学</span>
  <span class="subject">药理学</span>
</div>
<svg id="mindmap"></svg>
<div class="legend">
  <b>操作：</b> 鼠标拖拽移动 · 滚轮缩放 · 点击节点展开/折叠
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
<script>
  const md = "# 传出神经系统药理学\n\n## 胆碱能系统（M/N受体）\n- **M受体激动剂**\n  - 毛果芸香碱\n    - ✅缩瞳 → 降眼压\n    - ✅调节痉挛\n    - 用途：青光眼\n- **胆碱酯酶抑制剂**\n  - 新斯的明\n    - 兴奋骨骼肌最强\n    - 用途：重症肌无力\n  - 有机磷中毒\n    - 抑制胆碱酯酶\n    - M样+N样+中枢症状\n    - 解救：阿托品 + 碘解磷定\n- **M受体阻断剂**\n  - 阿托品\n    - 散瞳、升眼压、调节麻痹\n    - 松弛胃肠道平滑肌最强\n    - 加快心率\n    - 禁忌：青光眼、前列腺增生\n\n## 肾上腺素能系统（α/β受体）\n- **α受体激动剂**\n  - 去甲肾上腺素\n    - 收缩血管、升压\n    - 不良反应：局部缺血坏死\n- **β受体激动剂**\n  - 异丙肾上腺素\n    - 加快心率、扩支气管\n- **α+β受体激动剂**\n  - 肾上腺素\n    - 强心升压\n    - 过敏性休克首选\n    - 心脏骤停\n    - 局部止血\n- **β受体阻断剂**\n  - 普萘洛尔\n    - 降压、减慢心率\n    - 非选择性\n  - 阿替洛尔\n    - 选择性β1\n\n## 口诀速记\n- 🎯 毛缩新兴阿散升\n- 🎯 去缩肾强普降心\n- 🎯 有机磷中毒阿托品，复活碘解氯解磷";
  const { Transformer } = markmap;
  const { Markmap } = window.markmap;
  const transformer = new Transformer();
  const { root } = transformer.transform(md);
  const mm = Markmap.create('#mindmap', {
    colorFreezeLevel: 2,
    initialExpandLevel: 3,
    paddingX: 16,
    autoFit: true,
    duration: 300
  }, root);
  setTimeout(() => mm.fit(), 500);
</script>
</body>
</html>
