<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第五章 医疗机构药事管理 - 思维导图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #mindmap { width: 100vw; height: 100vh; }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #722ed1; color: white; padding: 12px 24px;
    font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header .subject { font-size: 13px; opacity: 0.85; }
  .legend {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: white; padding: 12px 16px; border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; color: #666;
  }
  .legend b { color: #333; }
</style>
</head>
<body>
<div class="header">
  <span>🧠 第五章 医疗机构药事管理</span>
  <span class="subject">药事管理</span>
</div>
<svg id="mindmap"></svg>
<div class="legend">
  <b>操作：</b> 鼠标拖拽移动 · 滚轮缩放 · 点击节点展开/折叠
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
<script>
  const md = "# 医疗机构药事管理\n\n## 处方调剂流程\n- 收方 → 审方 → 计价 → 调配 → 核对 → 发药 → 用药指导\n\n## 四查十对\n- **查处方**\n  - 对科别、姓名、年龄\n- **查药品**\n  - 对药名、剂型、规格、数量\n- **查配伍禁忌**\n  - 对药品性质、用法用量\n- **查用药合理性**\n  - 对临床诊断\n\n## ADR报告\n- 报告范围\n  - 监测期内：所有ADR\n  - 监测期满：新的+严重的\n- 报告时限\n  - 新的/严重ADR → **15个工作日**\n  - 死亡病例 → **立即报告**\n- 报告主体\n  - 医疗机构、生产企业、经营企业\n\n## 口诀速记\n- 🎯 查处方对科名龄\n- 🎯 查药品对名规数\n- 🎯 查配伍对性用量\n- 🎯 查合理对诊断\n- 🎯 ADR合格正常用，严重十五死立报";
  const { Transformer } = markmap;
  const { Markmap } = window.markmap;
  const transformer = new Transformer();
  const { root } = transformer.transform(md);
  const mm = Markmap.create('#mindmap', {
    colorFreezeLevel: 2,
    initialExpandLevel: 3,
    paddingX: 16,
    autoFit: true,
    duration: 300
  }, root);
  setTimeout(() => mm.fit(), 500);
</script>
</body>
</html>
