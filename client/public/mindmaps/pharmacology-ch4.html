<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第四章 心血管系统药理学 - 思维导图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #mindmap { width: 100vw; height: 100vh; }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #1890ff; color: white; padding: 12px 24px;
    font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header .subject { font-size: 13px; opacity: 0.85; }
  .legend {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: white; padding: 12px 16px; border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; color: #666;
  }
  .legend b { color: #333; }
</style>
</head>
<body>
<div class="header">
  <span>🧠 第四章 心血管系统药理学</span>
  <span class="subject">药理学</span>
</div>
<svg id="mindmap"></svg>
<div class="legend">
  <b>操作：</b> 鼠标拖拽移动 · 滚轮缩放 · 点击节点展开/折叠
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
<script>
  const md = "# 心血管系统药理学\n\n## 抗高血压药（六大类）\n- **利尿药**（氢氯噻嗪）\n  - 减少血容量\n- **β受体阻断药**（普萘洛尔）\n  - 减慢心率，降心输出量\n- **CCB**（硝苯地平）\n  - 扩张动脉血管\n- **ACEI**（卡托普利）\n  - 抑制AngⅡ生成\n  - 保护心肾靶器官\n  - 不良反应：干咳\n- **ARB**（氯沙坦）\n  - 阻断AT₁受体\n  - 不引起干咳\n- **α受体阻断药**（哌唑嗪）\n\n## 抗心绞痛药\n- **硝酸甘油**\n  - 释放NO → 扩静脉为主\n  - 降低前负荷 → 心肌耗氧↓\n- **β受体阻断药**\n  - 减慢心率 → 耗氧↓\n- **CCB**\n  - 扩冠脉、降后负荷\n  - 变异型心绞痛首选\n\n## 强心苷（地高辛）\n- 机制：抑制Na⁺-K⁺-ATP酶\n  - → Na⁺↑ → Ca²⁺↑ → 收缩力↑\n- 用途：慢性心衰、房颤\n- 中毒表现\n  - 胃肠道（最早）\n  - 心脏毒性（最严重）\n  - 中枢症状\n- 中毒解救：补钾、苯妥英钠\n\n## 抗心律失常药\n- Ⅰ类：钠通道阻滞\n  - ⅠA 奎尼丁\n  - ⅠB 利多卡因（室性首选）\n  - ⅠC 普罗帕酮\n- Ⅱ类：β受体阻断药\n- Ⅲ类：延长APD（胺碘酮）\n- Ⅳ类：CCB（维拉帕米）\n\n## 调血脂药\n- **他汀类**（辛伐他汀）\n  - 抑制HMG-CoA还原酶\n  - 降LDL-C为主\n  - 不良反应：肌病\n- **贝特类**（非诺贝特）\n  - 激活PPAR-α\n  - 降TG为主\n\n## 抗凝血药\n- **华法林**\n  - 抑制VitK环氧化物还原酶\n  - 口服、慢效、监测INR\n- **肝素**\n  - 激活AT-Ⅲ\n  - 静脉、快效\n  - 解救：鱼精蛋白\n\n## 口诀速记\n- 🎯 利贝钙ACE，ARB也能降\n- 🎯 硝酸扩静β减率，变异心痛选CCB\n- 🎯 地高辛强心，中毒先补钾\n- 🎯 华法林慢肝素快，鱼精蛋白解肝素";
  const { Transformer } = markmap;
  const { Markmap } = window.markmap;
  const transformer = new Transformer();
  const { root } = transformer.transform(md);
  const mm = Markmap.create('#mindmap', {
    colorFreezeLevel: 2,
    initialExpandLevel: 3,
    paddingX: 16,
    autoFit: true,
    duration: 300
  }, root);
  setTimeout(() => mm.fit(), 500);
</script>
</body>
</html>
