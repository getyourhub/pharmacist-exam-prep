<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第四章 固体制剂 - 思维导图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #mindmap { width: 100vw; height: 100vh; }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #52c41a; color: white; padding: 12px 24px;
    font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header .subject { font-size: 13px; opacity: 0.85; }
  .legend {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: white; padding: 12px 16px; border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px; color: #666;
  }
  .legend b { color: #333; }
</style>
</head>
<body>
<div class="header">
  <span>🧠 第四章 固体制剂</span>
  <span class="subject">药剂学</span>
</div>
<svg id="mindmap"></svg>
<div class="legend">
  <b>操作：</b> 鼠标拖拽移动 · 滚轮缩放 · 点击节点展开/折叠
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
<script>
  const md = "# 固体制剂\n\n## 片剂辅料（五大类）\n- **稀释剂（填充剂）**\n  - 淀粉、乳糖、微晶纤维素\n  - 作用：增体积\n- **黏合剂**\n  - 淀粉浆、HPMC、PVP\n  - 作用：粘合粉末\n- **崩解剂**\n  - 干淀粉、CMS-Na、交联PVP\n  - 作用：促崩解\n- **润滑剂**\n  - 硬脂酸镁、滑石粉\n  - 作用：减摩擦防粘冲\n- **助流剂**\n  - 微粉硅胶\n  - 作用：改善流动性\n\n## 片剂制备方法\n- **湿法制粒压片** ⭐最常用\n  - 混合→制软材→制粒→干燥→整粒→压片\n- **干法制粒压片**\n  - 对湿热敏感药物\n- **粉末直接压片**\n  - 流动性好、可压性好\n\n## 胶囊剂\n- 硬胶囊（填充）\n- 软胶囊（密封）\n- 优点\n  - 掩盖臭味\n  - 提高稳定性\n  - 生物利用度高\n- 三不宜\n  - 水溶液/稀醇\n  - 易风化\n  - 易潮解\n\n## 缓释与控释\n- **缓释**\n  - 非恒速释放\n  - 一级动力学\n- **控释**\n  - 恒速释放\n  - 零级动力学\n- 设计原理\n  - 溶出控制\n  - 扩散控制\n  - 渗透压驱动\n\n## 口诀速记\n- 🎯 稀黏崩润助五辅料\n- 🎯 缓释一级控零级\n- 🎯 水风化潮解三不宜";
  const { Transformer } = markmap;
  const { Markmap } = window.markmap;
  const transformer = new Transformer();
  const { root } = transformer.transform(md);
  const mm = Markmap.create('#mindmap', {
    colorFreezeLevel: 2,
    initialExpandLevel: 3,
    paddingX: 16,
    autoFit: true,
    duration: 300
  }, root);
  setTimeout(() => mm.fit(), 500);
</script>
</body>
</html>
